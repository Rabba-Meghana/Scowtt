services:
  db:
    image: postgres:16-alpine
    container_name: movie_memory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: moviememory
      POSTGRES_PASSWORD: moviememory
      POSTGRES_DB: moviememory
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moviememory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
